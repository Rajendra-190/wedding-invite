<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajendra ❤️ Gudiya Wedding</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #5a0f2e, #1a1a1a);
    color: white;
    text-align: center;
}

/* INTRO SCREEN */
#intro {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#intro button {
    padding: 14px 28px;
    font-size: 18px;
    background: gold;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

/* MAIN CONTENT HIDDEN FIRST */
#mainContent {
    display: none;
}

section {
    padding: 20px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

h1, h2 {
    color: gold;
}

.countdown {
    font-size: 1.5rem;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 12px;
    margin: 10px auto;
    max-width: 350px;
}

img {
    width: 100%;
    max-width: 300px;
    border-radius: 12px;
    border: 3px solid gold;
}

.flower {
    position: fixed;
    top: -50px;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    100% { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="wedding_invitation_card_music_bollywood_song_arrahman_wedding_ga.mp3" type="audio/mpeg">
</audio>

<!-- STEP 1 -->
<div id="intro">
    <h1>💌 Wedding Invitation</h1>
    <p>Tap to open</p>
    <button onclick="startExperience()">Open Card</button>
</div>

<!-- STEP 2 -->
<div id="mainContent">

<section>
    <h1>Rajendra ❤️ Gudiya Wedding</h1>
    <p>With love, we invite you 💍</p>
    <div class="countdown" id="countdown"></div>
</section>

<section>
    <h2>💑 Rajendra ❤️ Gudiya</h2>
    <div class="card">
        <img src="couple.jpg.jpeg">
        <p><b>Ek nayi zindagi ki shuruaat...</b></p>
    </div>
</section>

<section>
    <h2>Wedding Details</h2>
    <p>📅 29 April 2026</p>
    <p>📍 Saibasi, Fatehpur</p>
</section>

</div>

<script>
// 🎵 START EVERYTHING ON CLICK
function startExperience() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    // play music (guaranteed)
    document.getElementById("music").play();

    startCountdown();
    startFlowers();
}

// ⏳ COUNTDOWN
function startCountdown() {
    var weddingDate = new Date("April 29, 2026 17:00:00").getTime();

    setInterval(function() {
        var now = new Date().getTime();
        var distance = weddingDate - now;

        var days = Math.floor(distance / (1000*60*60*24));
        var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
        var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

        document.getElementById("countdown").innerHTML =
        days + " Days " + hours + " Hrs " + minutes + " Min";
    }, 1000);
}

// 🌸 FLOWERS
function startFlowers() {
    var flowers = ['🌸','🌺','🌼','🌻'];

    setInterval(function() {
        var f = document.createElement('div');
        f.className = 'flower';
        f.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
        f.style.left = Math.random() * window.innerWidth + 'px';
        f.style.animationDuration = (3 + Math.random() * 5) + 's';
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 8000);
    }, 500);
}
</script>

</body>
</html>
